<!DOCTYPE html> 
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KPC App | อุปกรณ์สำรองหอ D</title>
    <base target="_top">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; display: flex; justify-content: center; margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; }
        .iphone-15-container { width: 100vw; max-width: 500px; height: 100vh; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; position: relative; }
        header { flex-shrink: 0; }
        .category-scroll { flex-shrink: 0; display: flex; overflow-x: auto; white-space: nowrap; padding: 10px; gap: 8px; scrollbar-width: none; background: #fff; border-bottom: 1px solid #f3f4f6; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .content-area { flex-grow: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; padding-bottom: 100px; /* เว้นที่ให้ปุ่มลอย */ }
        
/* 1. ปุ่มสลับมุมมอง (น้ำเงิน) - อยู่บนสุด */
.fab {
  position: absolute;
  bottom: 140px; /* ขยับขึ้นไปชั้นบน */
  right: 20px;
  width: 50px;
  height: 50px;
  background-color: #2563eb; 
  color: white;
  border-radius: 50%;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 20px;
  z-index: 100;
  border: none;
}

/* 2. ปุ่ม Export PDF (แดง) - อยู่ตรงกลาง */
.pdf-btn {
  position: absolute;
  bottom: 80px; /* อยู่ระหว่างปุ่มน้ำเงินและเขียว */
  right: 20px;
  width: 50px;
  height: 50px;
  background-color: #ef4444; /* สีแดง PDF */
  color: white;
  border-radius: 50%;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 20px;
  z-index: 100;
  border: none;
}
/* ปรับแต่งช่อง Input ให้ดูเนียนตา */
#searchInput {
    -webkit-appearance: none; /* สำหรับ iOS */
}

/* ปรับระยะห่างระหว่างเลขกล่องกับช่องค้นหา */
.category-scroll {
    border-bottom: none; /* ลบเส้นใต้เลขกล่องออก เพราะจะมีช่องค้นหามาคั่นแทน */
}
.category-scroll {
    /* ... โค้ดเดิมของคุณ ... */
    scroll-behavior: smooth; /* ทำให้เวลาเลื่อนแล้วดูนุ่มนวลขึ้น */
    cursor: grab; /* เปลี่ยนสัญลักษณ์เม้าส์ให้เป็นรูปมือ (เผื่อคนอยากคลิกค้างแล้วลาก) */
}

.category-scroll:active {
    cursor: grabbing; /* ตอนคลิกค้างให้เป็นรูปมือกำ */
}
/* ปรับขนาดปุ่มเลขกล่องให้เล็กลงนิดนึงจะได้ไม่เกะกะ */
.category-btn {
    padding: 4px 12px;
    font-size: 12px;
}
/* 3. ปุ่มเพิ่มข้อมูล (เขียว) - อยู่ล่างสุด */
.add-float-btn {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 50px;
  height: 50px;
  background: #27ae60;
  color: white;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  z-index: 100;
  border: none;
}
        
        .grid-view { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .list-view { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .image-container { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; border-radius: 8px; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
      
        /* จัดวางตำแหน่งเลขกล่องให้อยู่มุมซ้ายบนของรูป */
.badge-box {
    position: absolute;
    top: 5px;   /* ขยับขึ้นไปอีกนิด */
    left: 5px;  /* ขยับไปทางซ้ายอีกหน่อย */
    background: rgba(37, 99, 235, 0.85); /* จางลงนิดนึงเพื่อให้เห็นรูปข้างหลัง */
    color: white;
    font-size: 8px; /* ปรับขนาดตัวอักษรให้เล็กลงหน่อยสำหรับจอ 3 คอลัมน์ */
    font-weight: bold;
    padding: 2px 6px; 
    border-radius: 4px; /* มนน้อยลงหน่อยให้ดูคม */
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 3px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

/* ปรับ CSS ของ badge-reserve (คงเหลือ) ให้ดูสมดุลขึ้น */
.badge-reserve {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.7); /* สีดำโปร่งแสง */
    color: white;
    font-size: 9px;
    padding: 4px;
    text-align: center;
    font-weight: bold;
}
        
        .category-btn { padding: 6px 15px; border-radius: 50px; font-size: 13px; transition: all 0.2s; border: 1px solid #e5e7eb; } 
        .btn-active { background-color: #2563eb; color: white; border-color: #2563eb; font-weight: bold; }
        .btn-inactive { background-color: #f3f4f6; color: #4b5563; }
        
        footer { position: absolute; bottom: 0; left: 0; right: 0; background-color: #2563eb; color: white; text-align: center; padding: 10px; font-size: 0.75rem; z-index: 40; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div class="iphone-15-container">
        <header class="p-4 bg-blue-600 text-white text-center font-bold text-lg shadow-md relative">
            <span id="headerTitle" class="transition-opacity duration-300">รายการอุปกรณ์สำรองหอ D</span>
        </header>

        <div class="category-scroll" id="categoryBar"></div>

        <div class="px-4 py-3 bg-white">
    <div class="relative flex items-center">
        <i class="fas fa-search absolute left-4 text-gray-400 text-sm"></i>
        <input type="text" id="searchInput" placeholder="พิมพ์ชื่ออุปกรณ์เพื่อค้นหา..." 
            class="w-full bg-gray-100 border border-gray-200 rounded-2xl py-2.5 pl-10 pr-4 text-sm focus:outline-none focus:border-blue-500 focus:bg-white transition-all shadow-sm"
        >
    </div>
</div>

        <div class="content-area">
            <div id="content" class="grid-view">
                <div id="loading" class="col-span-full flex flex-col items-center justify-center py-20 w-full">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                    <p class="mt-4 text-gray-500 text-sm font-medium">กำลังโหลดข้อมูล...</p>
                </div>
            </div>
        </div>

        <button class="fab" id="viewSwitcher"><i class="fas fa-list-ul"></i></button>
        <button class="pdf-btn" onclick="exportToPDF()" title="ส่งออก PDF"><i class="fas fa-file-pdf"></i></button>
        <button class="add-float-btn" onclick="goAdd()"><i class="fas fa-plus"></i></button>
        
        <footer>ระบบบริหารจัดการอุปกรณ์สำรอง</footer>
    </div>

    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-xl shadow-2xl opacity-0 pointer-events-none transition-all duration-300 z-[100]">
        ✅ บันทึกข้อมูลเรียบร้อยแล้ว
    </div>

    <div id="detailModal" onclick="checkClose(event)" class="fixed inset-0 bg-black/80 z-[150] flex items-center justify-center p-4 hidden transition-opacity duration-300">
        <div onclick="event.stopPropagation()" class="bg-white rounded-3xl w-full max-w-sm max-h-[90vh] overflow-hidden shadow-2xl relative animate-fadeIn">
            <button onclick="closeModal()" class="absolute top-4 right-4 z-20 bg-white/80 rounded-full w-8 h-8 flex items-center justify-center shadow-md"><i class="fas fa-times"></i></button>
            <img id="modalImg" src="" class="w-full h-60 object-cover">
            <div class="p-6">
                <h2 id="modalTitle" class="font-bold text-2xl text-gray-900"></h2>
              <div class="mt-1 flex items-center gap-1">
                <span class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded-lg">
                    <i class="fas fa-box"></i> กล่องหมายเลข: <span id="modalCategory"></span>
                </span>
            </div>
                <div id="modalDesc" class="text-sm text-gray-600 mt-2 mb-4"></div>
                <div class="flex items-center justify-between bg-gray-50 p-4 rounded-2xl mb-6">
                    <div>
                        <span class="text-xs text-gray-500 block">คงเหลือ</span>
                        <span id="stockQty" class="text-xl font-bold text-blue-600">0</span> <span class="text-xs text-gray-500">ชิ้น</span>
                    </div>
                    <div class="flex items-center gap-3 bg-white p-1 rounded-xl shadow-sm border border-gray-100">
                        <button onclick="updateQty(-1)" class="w-8 h-8 rounded-lg bg-gray-50 text-blue-600"><i class="fas fa-minus text-xs"></i></button>
                        <span id="orderQty" class="w-8 text-center font-bold">1</span>
                        <button onclick="updateQty(1)" class="w-8 h-8 rounded-lg bg-gray-50 text-blue-600"><i class="fas fa-plus text-xs"></i></button>
                    </div>
                </div>
                
                <div class="flex gap-3">
                    <button id="orderBtn" onclick="submitOrder()" class="flex-1 bg-blue-600 text-white font-bold py-4 rounded-2xl">นำออก</button>
                    <button onclick="addStock()" class="flex-1 bg-green-600 text-white font-bold py-4 rounded-2xl">เพิ่มเข้า</button>
                </div>

                <div id="deleteContainer" class="mt-4 hidden border-t pt-4">
                    <button id="deleteBtn" onclick="confirmDelete()" class="w-full text-red-500 font-bold py-2 flex items-center justify-center gap-2"><i class="fas fa-trash-alt"></i> ลบรายการนี้</button>
                </div>
            </div>
        </div>
    </div>

    <div id="deleteConfirmModal" class="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl w-full max-w-xs p-6 shadow-2xl text-center">
            <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-exclamation-triangle text-2xl"></i></div>
            <h3 class="font-bold text-lg">ยืนยันการลบ?</h3>
            <p class="text-sm text-gray-500 my-2" id="deleteItemName"></p>
            <div class="flex gap-3 mt-6">
                <button onclick="closeDeleteModal()" class="flex-1 text-gray-500">ยกเลิก</button>
                <button id="btnRealDelete" onclick="executeDelete()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold">ลบเลย</button>
            </div>
        </div>
    </div>

<script>
let data = [];
let currentFilter = "All";
let currentView = 'grid'; 
let currentQty = 1;
let currentItemData = null;

const API_URL = "https://script.google.com/macros/s/AKfycbxtlif0M0VH8XuDzEFUzOPkZFmcLX5JT9eL5c1zmsqjaxclb25cI0WhmVwMIABSW1TI2g/exec";

function getDriveImageUrl(url) {
    if (!url || url.includes('placehold.co')) return url;
    const match = url.match(/[-\w]{25,}/);
    if (match && url.includes('drive.google.com')) {
        return `https://drive.google.com/thumbnail?sz=w1000&id=${match[0]}`;
    }
    return url;
}
// เพิ่มฟังก์ชันนี้เข้าไปในส่วน <script> ของ index.html
function exportToPDF() {
    showToast("กำลังเตรียมเปิดรายงาน PDF...");
    
    // เนื่องจากคุณแยกหน้า Index ไว้ที่ GitHub 
    // แต่หน้า PDF อยู่ที่ Apps Script คุณต้องใช้ API_URL ในการเรียกครับ
    const pdfUrl = API_URL + "?page=pdf";
    
    // เปิดหน้า PDF ใน Tab ใหม่
    window.open(pdfUrl, "_blank");
}
async function loadData() {
    const container = document.getElementById('content');
    try {
        const res = await fetch(API_URL + "?action=getData");
        const json = await res.json();
        data = json.map(item => ({
            title: item.name || "-",
            img: getDriveImageUrl(item.img),
            category: item.category || "อื่นๆ",
            qty: Number(item.qty) || 0,
            desc: item.remark || "",
            id: item.id
        }));

        const categories = ["All", ...new Set(data.map(i => i.category))];
        renderCategoryButtons(categories);
        if (!categories.includes(currentFilter)) currentFilter = "All";
        filterData(currentFilter);
    } catch (error) {
        container.innerHTML = "<p class='text-center p-10 text-red-500'>โหลดข้อมูลไม่สำเร็จ</p>";
    }
}

function renderCategoryButtons(categories) {
    const categoryBar = document.getElementById('categoryBar');
    categoryBar.innerHTML = ''; 
    categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.innerText = cat;
        btn.className = `category-btn ${currentFilter === cat ? 'btn-active' : 'btn-inactive'}`;
        btn.onclick = () => { currentFilter = cat; renderCategoryButtons(categories); filterData(cat); };
        categoryBar.appendChild(btn);
    });
}

function filterData(selectedCat) {
    const container = document.getElementById('content');
    container.innerHTML = ''; 
    const filtered = selectedCat === "All" ? data : data.filter(item => item.category === selectedCat);
    if (filtered.length === 0) { container.innerHTML = "<p class='col-span-full text-center p-10'>ไม่พบรายการ</p>"; return; }

    filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = "card bg-white border rounded-xl overflow-hidden shadow-sm animate-fadeIn cursor-pointer";
        card.onclick = () => openModal(item.id);
        card.innerHTML = `
            <div class="image-container">
                <img src="${item.img}" class="card-img" onerror="this.src='https://placehold.co/200x200?text=No+Image'">
                <div class="badge-reserve">${item.qty} ชิ้น</div>
            </div>
            <div class="p-2">
                <h3 class="font-bold text-[10px] truncate">${item.title}</h3>
            </div>
        `;
        container.appendChild(card);
    });
}

function openModal(id) {
    const item = data.find(i => String(i.id) === String(id));
    if (!item) return;
    currentItemData = item;
    currentQty = 1;

    document.getElementById('orderQty').innerText = currentQty;
    document.getElementById('stockQty').innerText = item.qty;
    document.getElementById('modalImg').src = item.img;
    document.getElementById('modalTitle').innerText = item.title;
    document.getElementById('modalCategory').innerText = item.category;
    document.getElementById('modalDesc').innerHTML = (item.desc || "").replace(/\n/g, '<br>');

    const deleteContainer = document.getElementById('deleteContainer');
    deleteContainer.classList.toggle('hidden', item.qty !== 0);

    const orderBtn = document.getElementById('orderBtn');
    if (item.qty === 0) {
        orderBtn.disabled = true;
        orderBtn.classList.replace("bg-blue-600", "bg-gray-300");
        orderBtn.innerText = "ของหมด";
    } else {
        orderBtn.disabled = false;
        orderBtn.classList.replace("bg-gray-300", "bg-blue-600");
        orderBtn.innerText = "นำออก";
    }

    document.getElementById('detailModal').classList.remove('hidden');
}

function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
function checkClose(e) { if (e.target.id === "detailModal") closeModal(); }

function updateQty(amount) {
    currentQty += amount;
    if (currentQty < 1) currentQty = 1; // กันไม่ให้ติดลบหรือเป็น 0
    // ลบบรรทัดที่เช็ค currentQty > currentItemData.qty ออกไปเลย
    document.getElementById('orderQty').innerText = currentQty;
}

async function submitOrder() {
    if (!currentItemData) return;
    
    // เพิ่มการเช็คตรงนี้:
    if (currentQty > currentItemData.qty) {
        alert("ไม่สามารถนำออกเกินจำนวนที่มีอยู่ได้! (มีอยู่ " + currentItemData.qty + " ชิ้น)");
        return;
    }

    showToast("กำลังดำเนินการ...");
    await fetch(`${API_URL}?action=order&id=${currentItemData.id}&qty=${currentQty}`);
    showToast(`นำออก ${currentQty} ชิ้นเรียบร้อย`);
    closeModal();
    loadData();
}

async function addStock() {
    if (!currentItemData) return;
    showToast("กำลังดำเนินการ...");
    await fetch(`${API_URL}?action=addStock&id=${currentItemData.id}&qty=${currentQty}`);
    showToast(`เพิ่มเข้า ${currentQty} ชิ้นเรียบร้อย`);
    closeModal();
    loadData();
}

function confirmDelete() {
    document.getElementById('deleteItemName').innerText = currentItemData.title;
    document.getElementById('deleteConfirmModal').classList.remove('hidden');
}

function closeDeleteModal() { document.getElementById('deleteConfirmModal').classList.add('hidden'); }

async function executeDelete() {
    const btn = document.getElementById('btnRealDelete');
    btn.disabled = true;
    btn.innerText = "กำลังลบ...";
    try {
        const res = await fetch(`${API_URL}?action=delete&id=${currentItemData.id}`);
        const text = await res.text();
        if (text.includes("Success")) {
            showToast("ลบเรียบร้อย");
            closeDeleteModal(); closeModal(); loadData();
        } else { alert("ลบไม่สำเร็จ: " + text); }
    } catch (e) { alert("Error: " + e.message); }
    finally { btn.disabled = false; btn.innerText = "ลบเลย"; }
}
// 1. ดักจับการพิมพ์ในช่องค้นหา (ปรับให้เรียกใช้ filterData กลางเพื่อความแม่นยำ)
document.getElementById('searchInput').addEventListener('input', () => {
    filterData(currentFilter); 
});

// 2. ปรับปรุงฟังก์ชัน filterData (เพื่อให้กรองทั้ง "คำค้นหา" และ "เลขกล่อง" พร้อมกันเสมอ)
function filterData(selectedCat) {
    currentFilter = selectedCat; // เก็บหมวดหมู่ปัจจุบันไว้
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    
    // กรองข้อมูลโดยเช็คทั้ง หมวดหมู่ และ คำค้นหา
    const filtered = data.filter(item => {
        const matchesCat = (selectedCat === "All" || String(item.category) === String(selectedCat));
        const matchesName = item.title.toLowerCase().includes(searchTerm);
        return matchesCat && matchesName;
    });

    renderFilteredItems(filtered);
}

// 3. ฟังก์ชันแสดงผล (คงเดิม แต่ปรับดีไซน์ตัวหนังสือเลขกล่องให้ชัดขึ้นนิดหน่อย)
function renderFilteredItems(items) {
    const container = document.getElementById('content');
    container.innerHTML = ''; 
    
    if (items.length === 0) {
        container.innerHTML = "<div class='col-span-full text-center py-20 text-gray-400'><i class='fas fa-search mb-2 text-2xl'></i><p>ไม่พบรายการที่ค้นหา</p></div>";
        return;
    }

    items.forEach(item => {
        const card = document.createElement('div');
        // เพิ่มเงื่อนไขเช็ค View (Grid/List) ให้ทำงานร่วมกันได้
        card.className = currentView === 'grid' 
            ? "card bg-white border rounded-xl overflow-hidden shadow-sm animate-fadeIn cursor-pointer"
            : "card bg-white border rounded-xl overflow-hidden shadow-sm animate-fadeIn cursor-pointer flex p-2 gap-3";
            
        card.onclick = () => openModal(item.id);
        
        // ปรับ HTML ภายในการ์ดให้รองรับทั้ง Grid และ List
        if (currentView === 'grid') {
            card.innerHTML = `
    <div class="image-container">
        <div class="badge-box">
            <i class="fas fa-box"></i> ${item.category}
        </div>
        
        <img src="${item.img}" class="card-img" onerror="this.src='https://placehold.co/200x200?text=No+Image'">
        <div class="badge-reserve">${item.qty} ชิ้น</div>
    </div>
    <div class="p-2 text-center">
        <h3 class="font-bold text-[10px] truncate text-gray-800">${item.title}</h3>
    </div>
`;
        } else {
card.innerHTML = `
    <div class="image-container w-20 h-20 flex-shrink-0">
        <div class="badge-box">
            <i class="fas fa-box"></i> ${item.category}
        </div>
        <img src="${item.img}" class="w-full h-full object-cover rounded-lg" onerror="this.src='https://placehold.co/200x200?text=No+Image'">
    </div>
    
    <div class="flex-1 flex flex-col justify-center">
        <h3 class="font-bold text-sm text-gray-800">${item.title}</h3>
        <p class="text-xs text-gray-500 mt-1">คงเหลือ: ${item.qty} ชิ้น</p>
    </div>
`;
        }
        container.appendChild(card);
    });
}
function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.classList.replace("opacity-0", "opacity-100");
    setTimeout(() => toast.classList.replace("opacity-100", "opacity-0"), 2500);
}

document.getElementById('viewSwitcher').onclick = () => {
    currentView = currentView === 'grid' ? 'list' : 'grid';
    document.getElementById('content').className = currentView === 'grid' ? 'grid-view' : 'list-view';
};

function goAdd() { window.open(API_URL + "?page=form", "_top"); }

loadData();
  // ฟังก์ชันทำให้แถบเลขกล่องเลื่อนซ้าย-ขวาด้วย Mouse Wheel
const categoryBar = document.getElementById('categoryBar');

categoryBar.addEventListener('wheel', (e) => {
    if (e.deltaY !== 0) {
        // ป้องกันไม่ให้หน้าเว็บหลักเลื่อนขึ้นลงขณะเลื่อนแถบเมนู
        e.preventDefault();
        
        // สั่งให้แถบเลื่อนไปด้านข้างตามแรงหมุนเม้าส์
        categoryBar.scrollLeft += e.deltaY;
    }
}, { passive: false });
  let isDown = false;
let startX;
let scrollLeft;

categoryBar.addEventListener('mousedown', (e) => {
    isDown = true;
    categoryBar.classList.add('active');
    startX = e.pageX - categoryBar.offsetLeft;
    scrollLeft = categoryBar.scrollLeft;
});

categoryBar.addEventListener('mouseleave', () => {
    isDown = false;
});

categoryBar.addEventListener('mouseup', () => {
    isDown = false;
});

categoryBar.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - categoryBar.offsetLeft;
    const walk = (x - startX) * 2; // คูณ 2 เพื่อให้ความเร็วการลากทันมือ
    categoryBar.scrollLeft = scrollLeft - walk;
});
</script>
