<!DOCTYPE html> 
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPC App | อุปกรณ์สำรองหอ D</title>
    <base target="_top">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
      body { 
        background-color: #f3f4f6; 
        display: flex; 
        justify-content: center; 
        margin: 0; 
        padding: 0;
        overflow: hidden; 
      }
      
      .iphone-15-container {
        width: 100vw; 
        max-width: 500px; 
        height: 100vh; 
        background: white;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        position: relative;
      }

      header { flex-shrink: 0; }

      .category-scroll {
        flex-shrink: 0;
        display: flex;
        overflow-x: auto;
        white-space: nowrap;
        padding: 10px;
        gap: 8px;
        scrollbar-width: none;
      }
      .category-scroll::-webkit-scrollbar { display: none; }

      .content-area { 
        flex-grow: 1; 
        overflow-y: auto; 
        padding: 12px;
        display: flex; /* เพิ่มบรรทัดนี้ */
        flex-direction: column; /* เพิ่มบรรทัดนี้ */
        padding-bottom: 60px; /* เว้นที่ไว้ให้ Footer */        
      }


      /* ตรวจสอบส่วน #content ให้มีความกว้างเต็มพื้นที่ */
      #content {
        width: 100%;
      }

      .card-img {
        width: 100%; 
        object-fit: cover; 
        display: block; 
      }

      /* คอนเทนเนอร์ของรูปภาพเพื่อให้ข้อความอ้างอิงตำแหน่งได้ */
      .image-container {
        position: relative;
        width: 100%;
      }

      /* สไตล์ของป้าย "สำรอง" */
      .badge-reserve {
        position: absolute;
        top: 5px;
        right: 5px;
        background-color: rgba(107, 114, 128, 0.85);
        color: white;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
        z-index: 10;
        pointer-events: none; /* เพื่อให้ยังคลิกรูปได้ปกติ */
      }

      /* ปรับขนาดฟอนต์สำหรับโหมด 3 คอลัมน์ให้เล็กลงอีกนิด */
      .grid-view .badge-reserve {
        font-size: 8px;
        padding: 1px 4px;
      }
      
      /* Layout Styles */
      .grid-view { 
        display: grid; 
        grid-template-columns: repeat(3, 1fr); /* เปลี่ยนจาก 2 เป็น 3 คอลัมน์ */
        gap: 8px; /* ลดช่องว่างระหว่าง Card เล็กน้อย */
      }
      .grid-view .title {
        font-size: 0.7rem; 
      }
            .grid-view .desc {
        font-size: 0.6rem;
      }
      .grid-view .card-img { aspect-ratio: 4 / 3; }
      
      .list-view { 
        display: grid; 
        grid-template-columns: 1fr; 
        gap: 15px; 
      }
      .list-view .card-img { aspect-ratio: 16 / 9; }
      .list-view .title { font-size: 1rem; }
      .list-view .desc { font-size: 0.875rem; }

      .fab {
        position: absolute;
        bottom: 45px; 
        right: 16px;
        width: 56px;
        height: 56px;
        background-color: #2563eb; 
        color: white;
        border-radius: 50%;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        z-index: 20;
        border: none;
      }
.add-float-btn {
  position: fixed;
  bottom: 25px;
  left: 25px; /* คนละฝั่งกับ Export PDF */
  background: #27ae60;
  color: white;
  border: none;
  padding: 14px 18px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(0,0,0,0.2);
  transition: 0.2s;
  z-index: 9999;
}

.add-float-btn:hover {
  background: #1e8449;
  transform: scale(1.05);
}
      footer {
        flex-shrink: 0;
        background-color: #2563eb; 
        color: white;
        text-align: center;
        /*padding: 12px;*/
        padding: 6px;
        font-size: 0.75rem;
        font-weight: 300;
      }

      /* เพิ่มในส่วน <style> */
#mainFooter {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 40; /* ให้อยู่เหนือเนื้อหาแต่ใต้ Modal */
  height: 50px;
}

     .category-btn {
        padding: 4px 15px;
        border-radius: 4px;
        transition: all 0.2s;
        border: 1px solid #e5e7eb;
      } 
      .btn-active { background-color: #2563eb; color: white; border-color: #2563eb; }
      .btn-inactive { background-color: #d1d5db; color: #1f2937; }
      
/* *** เพิ่ม CSS Animation ในส่วน <style> *** */

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-fadeIn {
  animation: fadeIn 0.4s ease-out forwards;
}

/* ปรับแต่งรายละเอียด Modal เพิ่มเติม */
#modalDesc {
  max-height: 40vh; /* จำกัดความสูงของรายละเอียดไม่ให้ล้นจอ */
  overflow-y: auto; /* ให้เลื่อนดูรายละเอียดได้ถ้ามันยาว */
  scrollbar-width: thin; /* สำหรับ Firefox */
}

 #toast {
    transform: translate(-50%, -20px);
  }
  #toast.opacity-100 {
    transform: translate(-50%, 0);
  }
      
/* ปรับแต่ง scrollbar ของรายการสรุป */
#summaryList::-webkit-scrollbar {
  width: 4px;
}
#summaryList::-webkit-scrollbar-thumb {
  background: #e5e7eb;
  border-radius: 10px;
}
      
    </style>
  </head>
  <body>

    <div class="iphone-15-container">
      <header class="p-3 bg-blue-600 text-white text-center font-bold text-lg">
        ทดสอบ!!รายการอุปกรณ์สำรองหอ D
      </header>

      <div class="category-scroll" id="categoryBar"></div>
      <div class="content-area" id="contentContainer">
        <div class="grid-view" id="content">
          <div id="loading" class="col-span-full flex flex-col items-center justify-center py-20 w-full">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-gray-500 text-sm font-medium">กำลังโหลดข้อมูล...</p>
          </div>
        </div>
      <button class="fab" id="viewSwitcher" title="สลับมุมมอง">
          <i class="fas fa-list-ul"></i>
      </button>
      <button class="add-float-btn" onclick="goAdd()">
  + เพิ่มข้อมูล
</button>
 <!-- 🔥 Toast -->
  <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-xl shadow-lg opacity-0 pointer-events-none transition-all duration-300 z-50">
    ✅ บันทึกข้อมูลเรียบร้อยแล้ว
  </div>
<footer class="bg-blue-600 text-white text-center">
  ระบบเบิกอุปกรณ์คอม
</footer>
    <div id="detailModal" onclick="checkClose(event)" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
      <div onclick="event.stopPropagation()" class="bg-white rounded-2xl w-full max-w-sm max-h-[90vh] overflow-y-auto shadow-2xl relative transform scale-95 transition-transform duration-300">

        <button onclick="closeModal()" class="absolute top-4 right-4 z-10 bg-white/70 backdrop-blur-sm rounded-full w-8 h-8 flex items-center justify-center text-gray-700">
          <i class="fas fa-times"></i>
        </button>

        <div class="relative">
          <img id="modalImg" src="" class="w-full h-64 object-cover rounded-t-2xl">
          <!--<div class="badge-reserve">สำรอง</div>-->
        </div>


        <div class="p-6">
          <h2 id="modalTitle" class="font-bold text-2xl text-gray-900"></h2>
          <div id="modalDesc" class="text-sm text-gray-700 leading-relaxed mt-4"></div>

          <hr class="my-6 border-gray-100">

          <div class="mb-2 text-sm text-gray-500">
  คงเหลือ: <span id="stockQty" class="font-bold text-blue-600">0</span> ชิ้น
</div>
<div class="flex items-center justify-between mb-6">
            <span class="font-bold text-gray-800">จำนวน</span>
            <div class="flex items-center border-2 border-gray-100 rounded-xl p-1 bg-gray-50">
              <button onclick="updateQty(-1)" class="w-10 h-10 flex items-center justify-center bg-white rounded-lg shadow-sm text-blue-600">
                <i class="fas fa-minus text-xs"></i>
              </button>
              <span id="orderQty" class="w-12 text-center font-bold text-lg text-gray-800">1</span>
              <button onclick="updateQty(1)" class="w-10 h-10 flex items-center justify-center bg-white rounded-lg shadow-sm text-blue-600">
                <i class="fas fa-plus text-xs"></i>
              </button>
            </div>
          </div>
         <div class="flex gap-3">
  <!-- 🔴 นำออก -->
  <button id="orderBtn" onclick="submitOrder()" 
    class="w-1/2 bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg">
    <i class="fas fa-minus"></i>
    นำออก
  </button>

  <!-- 🟢 เพิ่มเข้า -->
  <button onclick="addStock()" 
    class="w-1/2 bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg">
    <i class="fas fa-plus"></i>
    เพิ่มเข้า
  </button>
</div>
      </div>
    </div>    
<!---->    
<script>
let data = [];
let currentFilter = "All";
let currentView = 'grid'; 
let currentQty = 1;

const container = document.getElementById('content');
const categoryBar = document.getElementById('categoryBar');
const switcherBtn = document.getElementById('viewSwitcher');

const API_URL = "https://script.google.com/macros/s/AKfycbxK_M2tVN3DiW8sBbPatkfFpq-lRkpZ8SSV_QGJirzApkZgofB8Flj0XzV0GDdiY4rwvQ/exec";

// ================== โหลดข้อมูล ==================
async function loadData() {
  try {
    container.innerHTML = `
      <div class="col-span-full flex flex-col items-center justify-center py-20 w-full">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        <p class="mt-4 text-gray-500 text-sm font-medium">กำลังโหลดข้อมูล...</p>
      </div>
    `;

    const res = await fetch(API_URL + "?action=getData");
    const json = await res.json();

    data = json.map(item => ({
      title: item.name || "-",
      img: item.img || "https://via.placeholder.com/200",
      category: item.category || "อื่นๆ",
      qty: Number(item.qty) || 0,
      section: item.section || "",
      desc: item.remark || "",
      date: item.date || "",
      id: item.id
    }));

    const categories = ["All", ...new Set(data.map(i => i.category))];
    renderCategoryButtons(categories);
    filterData("All");

  } catch (error) {
    console.error(error);
    container.innerHTML = "<p class='text-center p-4 text-red-500'>โหลดข้อมูลไม่สำเร็จ</p>";
  }
}

// ================== หมวด ==================
function renderCategoryButtons(categories) {
  categoryBar.innerHTML = ''; 
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.innerText = cat;
    btn.className = `category-btn ${currentFilter === cat ? 'btn-active' : 'btn-inactive'}`;
    btn.onclick = () => {
      currentFilter = cat;
      renderCategoryButtons(categories); 
      filterData(cat);
    };
    categoryBar.appendChild(btn);
  });
}

// ================== แสดงข้อมูล ==================
function filterData(selectedCat) {
  container.innerHTML = ''; 
  const filtered = selectedCat === "All" ? data : data.filter(item => item.category === selectedCat);

  if (filtered.length === 0) {
    container.innerHTML = "<p class='col-span-full text-center p-10 text-gray-500'>ไม่พบรายการ</p>";
    return;
  }

  filtered.forEach((item, index) => {
    const card = document.createElement('div');
    card.className = "card bg-white border rounded-lg overflow-hidden shadow-sm animate-fadeIn cursor-pointer hover:shadow-md transition";

    const cardDesc = (item.desc || "").split('\n')[0];

    card.innerHTML = `
      <div class="image-container" onclick="openModal(${index})">
        <img src="${item.img}" class="card-img" onerror="this.src='https://via.placeholder.com/200'">
        <div class="badge-reserve">${item.category} | ${item.qty}</div>
      </div>
      <div class="p-1.5">
        <h3 class="font-bold text-[11px] truncate">${item.title}</h3>
        <p class="text-[9px] text-gray-600">${cardDesc}</p>
      </div>
    `;
    container.appendChild(card);
  });
}

// ================== VIEW ==================
switcherBtn.onclick = () => {
  currentView = currentView === 'grid' ? 'list' : 'grid';
  container.className = currentView === 'grid' ? 'grid-view' : 'list-view';

  switcherBtn.innerHTML =
    currentView === 'grid'
      ? '<i class="fas fa-list-ul"></i>'
      : '<i class="fas fa-th-large"></i>';
};

// ================== MODAL ==================
let currentItemData = null;

function openModal(index) {
  const filtered = currentFilter === "All" ? data : data.filter(i => i.category === currentFilter);
  const item = filtered[index];
  if (!item) return;

  currentItemData = item;
  currentQty = 1;

  document.getElementById('orderQty').innerText = currentQty;
  document.getElementById('stockQty').innerText = item.qty;
  document.getElementById('modalImg').src = item.img;
  document.getElementById('modalTitle').innerText = item.title;
  document.getElementById('modalDesc').innerHTML = (item.desc || "").replace(/\n/g, '<br>');

  // 🔥 กันของหมด
  const orderBtn = document.getElementById('orderBtn');
  if (item.qty === 0) {
    orderBtn.disabled = true;
    orderBtn.innerHTML = "❌ ของหมด";
    orderBtn.classList.add("bg-gray-400");
  } else {
    orderBtn.disabled = false;
    orderBtn.innerHTML = '<i class="fas fa-minus"></i> นำออก';
    orderBtn.classList.remove("bg-gray-400");
  }

  document.getElementById('detailModal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('detailModal').classList.add('hidden');
}

// ================== จำนวน ==================
function updateQty(amount) {
  currentQty += amount;

  if (currentQty < 1) currentQty = 1;

  if (currentItemData && currentQty > currentItemData.qty) {
    currentQty = currentItemData.qty;
  }

  document.getElementById('orderQty').innerText = currentQty;
}

// ================== 🔴 นำออก ==================
async function submitOrder() {
  if (!currentItemData) return;

  if (currentItemData.qty === 0) {
    alert("ของหมด");
    return;
  }

  await fetch(`${API_URL}?action=order&id=${currentItemData.id}&qty=${currentQty}`);

  showToast(`นำออก ${currentQty} ชิ้น`);
  closeModal();
  loadData();
}

// ================== 🟢 เพิ่มเข้า ==================
async function addStock() {
  if (!currentItemData) return;

  await fetch(`${API_URL}?action=addStock&id=${currentItemData.id}&qty=${currentQty}`);

  showToast(`เพิ่มเข้า ${currentQty} ชิ้น`);
  closeModal();
  loadData();
}

// ================== TOAST ==================
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.innerText = "✅ " + msg;

  toast.classList.remove("opacity-0");
  toast.classList.add("opacity-100");

  setTimeout(() => {
    toast.classList.remove("opacity-100");
    toast.classList.add("opacity-0");
  }, 2000);
}

// ================== ไปหน้าเพิ่ม ==================
function goAdd() {
  window.open(API_URL + "?page=form", "_blank");
}

// ================== START ==================
loadData();
</script>
</div>
  </body>
</html>
